<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/images/Favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <noscript><link rel="stylesheet" href="{{ '/assets/css/noscript.css' | relative_url }}" /></noscript>
    <style>
      #header {
        margin-top: 0;
      }

      #header > * {
        margin-top: 2rem;
      }

      #header > *:before {
        top: calc(-2rem - 1px);
        height: calc(2rem + 1px);
      }

      #header .content .inner {
        padding: 1.5rem 1.75rem;
      }

      #header .content p {
        margin: 0;
      }

      #main {
        width: 100%;
        margin-top: 2rem;
      }

      #main article {
        width: min(100%, 56rem);
        margin: 0 auto;
      }

      #main article .close {
        text-indent: -9999px;
      }

      .hero {
        margin: 0 0 2rem;
      }

      .hero h1 {
        text-align: center;
        margin-top: 1rem;
      }

      .hero img {
        width: 100%;
        display: block;
        border-radius: 0.2rem;
      }

      .toc {
        background: rgba(238, 162, 214, 0.23);
        padding: 0.95rem;
        border-radius: 0.3rem;
      }

      .article-block {
        margin-top: 1.25rem;
        padding: 1rem;
        border-radius: 0.25rem;
        background: rgba(231, 161, 217, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .article-block h2 {
        margin-bottom: 0.55rem;
      }

      .article-cover {
        margin: 0 0 1rem;
      }

      .article-cover img {
        width: 100%;
        display: block;
        border-radius: 0.2rem;
      }

      .article-link {
        font-size: 0.9rem;
        opacity: 0.85;
      }

      .audio-player {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 15px;
        border-radius: 20px;
        backdrop-filter: blur(8px);
        border-top: 1px solid rgba(158, 157, 157, 0.4);
        border-left: 1px solid rgba(158, 157, 157, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
      }

      .audio-player button {
        background: transparent;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: white;
      }

      .audio-player input[type="range"] {
        flex: 1;
        height: 9px;
        border-radius: 5px;
        -webkit-appearance: none;
        background: linear-gradient(to right, #f06 0%, #f06 0%, #555 0%, #555 100%);
        cursor: pointer;
      }

      .audio-player input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #f06;
        cursor: pointer;
        margin-top: -1px;
      }

      .audio-player input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #f06;
        cursor: pointer;
      }

      .collapsible {
        border-radius: 25px;
        background-color: rgba(158, 157, 157, 0.027);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(158, 157, 157, 0.4);
        border-left: 1px solid rgba(158, 157, 157, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
        color: white;
        cursor: pointer;
        padding: 1px 22px;
        width: 100%;
        text-align: left;
        outline: none;
        font-size: 15px;
      }

      .collapsible.active,
      .collapsible:hover {
        border-radius: 25px;
        background-color: rgba(76, 75, 75, 0.027);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid rgba(76, 75, 75, 0.4);
        border-left: 1px solid rgba(176, 75, 75, 0.3);
        box-shadow: 3px 3px 3px rgba(0, 0, 0, 0.085);
      }

      .collapsible:after {
        content: "\002B";
        color: white;
        font-weight: bold;
        float: right;
        margin-left: 2px;
        flex-shrink: 0;
        transition: transform 0.25s ease, opacity 0.2s ease;
      }

      .collapsible.active:after {
        content: "\2212";
        transform: rotate(180deg);
      }

      .collapse-content {
        display: block;
        padding: 0 36px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s ease-out;
        margin-top: 0.5rem;
        background-color: rgba(0, 0, 0, 0);
        transform-origin: top left;
      }

      .collapse-content.open {
        max-height: 200rem;
        animation: collapse-text-drop 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .collapse-content.is-closing {
        animation: collapse-text-glitch 0.24s steps(2, end);
      }

      @keyframes collapse-text-drop {
        0% {
          opacity: 0;
          transform: translateY(-12px);
          filter: blur(6px);
        }
        60% {
          opacity: 1;
          transform: translateY(2px);
          filter: blur(1px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      @keyframes collapse-text-glitch {
        0% {
          opacity: 1;
          transform: translateX(0);
          text-shadow: none;
          filter: none;
        }
        15% {
          transform: translateX(-2px) skewX(2deg);
          text-shadow: 2px 0 rgba(255, 0, 90, 0.7),
            -2px 0 rgba(0, 255, 255, 0.7);
        }
        30% {
          transform: translateX(2px) skewX(-2deg);
          text-shadow: -2px 0 rgba(255, 0, 90, 0.6),
            2px 0 rgba(0, 255, 255, 0.6);
        }
        45% {
          opacity: 0.8;
          transform: translateX(-3px) skewX(4deg);
          filter: blur(0.6px);
        }
        60% {
          opacity: 0.6;
          transform: translateX(3px) skewX(-4deg);
          text-shadow: 3px 0 rgba(255, 0, 90, 0.6),
            -3px 0 rgba(0, 255, 255, 0.6);
        }
        100% {
          opacity: 0;
          transform: translateX(8px) skewX(-8deg);
          filter: blur(2px);
          text-shadow: 4px 0 rgba(255, 0, 90, 0.8),
            -4px 0 rgba(0, 255, 255, 0.8);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .collapse-content.open,
        .collapse-content.is-closing {
          animation: none;
        }
      }
      }

      @media (max-width: 640px) {
        #header .content .inner {
          padding: 1.25rem 1rem;
        }

        #main article {
          padding: 3rem 1rem 0.75rem 1rem;
        }
      }
    </style>
  </head>
  <body class="is-preload">
    <div id="wrapper">
      <header id="header">
        <div class="content">
          <div class="inner">
            <h1>{{ site.title }}</h1>
            <p>{{ page.title }}</p>
          </div>
        </div>
        {% include nav.html %}
      </header>
      <div id="main">
        <article id="page-content" class="active">
          <a class="close" href="{{ '/' | relative_url }}" aria-label="Back to home">&times;</a>
          <header class="hero">
            {% if page.hero_image %}
              <img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" />
            {% endif %}
            <h1>{{ page.title }}</h1>
          </header>
          {{ content }}
        </article>
      </div>
    </div>
    <div id="bg"></div>
    <script>
      window.setTimeout(() => {
        document.body.classList.remove("is-preload");
      }, 100);

      const spoilerNodes = document.querySelectorAll("spo");
      spoilerNodes.forEach((node) => {
        node.setAttribute("tabindex", "0");
        node.setAttribute("role", "button");
        node.addEventListener("click", () => node.classList.toggle("revealed"));
        node.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            node.classList.toggle("revealed");
          }
        });
      });

      const collapsibleNodes = document.querySelectorAll(".collapsible");
      collapsibleNodes.forEach((node) => {
        node.addEventListener("click", () => {
          const isOpen = node.classList.toggle("active");
          const content = node.nextElementSibling;
          if (!content) return;

          if (isOpen) {
            content.classList.remove("is-closing");
            content.classList.add("open");
            content.style.maxHeight = `${content.scrollHeight}px`;
          } else {
            content.classList.add("is-closing");
            content.addEventListener(
              "animationend",
              () => {
                content.classList.remove("is-closing");
              },
              { once: true }
            );
            content.style.maxHeight = "0px";
            content.classList.remove("open");
          }
        });
      });

      const players = document.querySelectorAll(".audio-player");
      players.forEach((player) => {
        const audio = player.querySelector("audio");
        const playBtn = player.querySelector('[data-audio="play"], #playBtn');
        const progress = player.querySelector('input[type="range"]');
        const timeNode = player.querySelector('[data-audio="time"], #time');
        if (!audio || !playBtn || !progress) return;

        const updateProgressFill = () => {
          const value = Number(progress.value) || 0;
          progress.style.background = `linear-gradient(to right, #f06 0%, #f06 ${value}%, #555 ${value}%, #555 100%)`;
        };

        const formatTime = (seconds) => {
          const mins = Math.floor(seconds / 60) || 0;
          const secs = Math.floor(seconds % 60) || 0;
          return `${mins}:${String(secs).padStart(2, "0")}`;
        };

        audio.addEventListener("timeupdate", () => {
          if (!audio.duration) return;
          progress.value = (audio.currentTime / audio.duration) * 100;
          updateProgressFill();
          if (timeNode) {
            timeNode.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
          }
        });

        progress.addEventListener("input", () => {
          if (!audio.duration) return;
          audio.currentTime = (Number(progress.value) / 100) * audio.duration;
          updateProgressFill();
        });

        playBtn.addEventListener("click", async () => {
          if (audio.paused) {
            try {
              await audio.play();
              playBtn.textContent = "II";
            } catch (error) {
            }
          } else {
            audio.pause();
            playBtn.textContent = ">";
          }
        });

        updateProgressFill();
      });
    </script>
    <script src="{{ '/assets/js/site-terminal.js' | relative_url }}"></script>
  </body>
</html>
