<!DOCTYPE HTML>
<html>
	<head>
		<link rel="icon" type="image/png" href="images/Favicon.png">
		<title>Mila's Image Host</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<script src="assets/js/seasonal-background.js"></script>
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/gallery.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			/* Custom Green Scrollbar */
			::-webkit-scrollbar {
				width: 10px;
			}
			::-webkit-scrollbar-track {
				background: #0d100d !important;
			}
			::-webkit-scrollbar-thumb {
				background: #90ee90 !important;
				border-radius: 10px;
				border: 2px solid #0d100d !important;
			}
			::-webkit-scrollbar-thumb:hover {
				background: #b2ffb2 !important;
			}
			* {
				scrollbar-width: thin;
				scrollbar-color: #90ee90 #0d100d !important;
			}
		</style>
	</head>
	<body class="is-preload">
		<div class="gallery-corner-tools gallery-corner-tools-left" aria-label="Editor tools">
			<button
				type="button"
				class="site-corner-tool gallery-editor-trigger"
				data-gallery-editor-open
				aria-label="Open image editor"
				title="Image editor">
				<i class="fas fa-image" aria-hidden="true"></i>
			</button>
		</div>

		<div class="gallery-corner-tools gallery-corner-tools-right" aria-label="Gallery tools">
			<button
				type="button"
				class="site-corner-tool gallery-search-trigger"
				data-gallery-search-toggle
				aria-label="Search gallery"
				title="Search">
				<i class="fas fa-search" aria-hidden="true"></i>
			</button>
			<div class="gallery-search-panel" data-gallery-search-panel hidden>
				<label for="gallerySearchInput">Search gallery</label>
				<input
					id="gallerySearchInput"
					type="search"
					data-gallery-search-input
					placeholder="Type a folder or image name..."
					autocomplete="off"
					spellcheck="false" />
				<div class="gallery-search-status" data-gallery-search-status aria-live="polite"></div>
			</div>
		</div>

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<div class="content">
							<div class="inner">
								<h1>Media Archive</h1>
								<p><b>Image hosting for Mila</b></p>
							</div>
						</div>
					</header>
				<!-- Main -->
					<div id="main" style="display: block;"></div>
			</div>

		<!-- BG -->
			<div id="bg"></div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="assets/js/gallery-init.js"></script>
			<script src="assets/js/fancy-text-generator.js"></script>
			<script src="interactive-background.js"></script>
	</body>
</html>
